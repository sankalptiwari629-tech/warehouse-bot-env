name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.SYNCFIX }}
        run: |
          git remote add space https://sankalptiwari629-tech:$HF_TOKEN@huggingface.co/spaces/sankalptiwari629-tech/warehouse-bot-env || true
          git push space main --force
